name: Miatoll USB DAC UAC2 (Stable Low Latency)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # ---------------- SOURCE ----------------
    - name: Checkout Kernel
      uses: actions/checkout@v4
      with:
        repository: clarencelol/kernel_xiaomi_sm6250
        ref: kinesis-v29
        path: kernel

    - name: Checkout AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: AnyKernel3

    # ---------------- DEPENDENCIES ----------------
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git wget curl bc bison flex \
        libssl-dev libncurses5-dev libncursesw5-dev \
        zip unzip python3 ccache xz-utils file

    # ---------------- LLVM 17 (PROVEN WORKING) ----------------
    - name: Setup LLVM 17
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.2/clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz --strip-components=1
        rm clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz

    # ---------------- GCC TOOLCHAINS ----------------
    - name: Setup GCC
      run: |
        mkdir -p toolchains/gcc64 toolchains/gcc32

        cd toolchains/gcc64
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc64.tar.gz
        tar -xf gcc64.tar.gz --strip-components=1
        rm gcc64.tar.gz

        cd ../gcc32
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc32.tar.gz
        tar -xf gcc32.tar.gz --strip-components=1
        rm gcc32.tar.gz

    # ---------------- ENV ----------------
    - name: Environment
      run: |
        echo "PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

    # ---------------- UAC2 WINDOWS PATCHES (ADAPTIVE SYNC + TERMINAL TYPES) ----------------
    - name: Apply Windows UAC2 Patches
      working-directory: ./kernel
      run: |
        set -e
        FILE="drivers/usb/gadget/function/f_uac2.c"

        echo "Checking that source file exists..."
        test -f "$FILE" || { echo "ERROR: $FILE not found"; exit 1; }

        # Patch 1: Change OUT endpoint from ASYNC to ADAPTIVE (critical for Windows)
        echo "Applying adaptive sync patch..."
        sed -i 's/USB_ENDPOINT_XFER_ISOC | USB_ENDPOINT_SYNC_ASYNC/USB_ENDPOINT_XFER_ISOC | USB_ENDPOINT_SYNC_ADAPTIVE/g' "$FILE"
        if grep -q "USB_ENDPOINT_SYNC_ASYNC" "$FILE"; then
          echo "ERROR: Adaptive sync patch failed - ASYNC still present"
          exit 1
        fi
        echo "Adaptive sync patch applied."

        # Patch 2: Set terminal types to MICROPHONE and SPEAKER
        echo "Applying terminal type patch..."
        sed -i 's/UAC_INPUT_TERMINAL_UNDEFINED/UAC_INPUT_TERMINAL_MICROPHONE/g' "$FILE"
        sed -i 's/UAC_OUTPUT_TERMINAL_UNDEFINED/UAC_OUTPUT_TERMINAL_SPEAKER/g' "$FILE"
        if ! grep -q "UAC_INPUT_TERMINAL_MICROPHONE" "$FILE"; then
          echo "ERROR: Terminal type patch (MICROPHONE) failed"
          exit 1
        fi
        if ! grep -q "UAC_OUTPUT_TERMINAL_SPEAKER" "$FILE"; then
          echo "ERROR: Terminal type patch (SPEAKER) failed"
          exit 1
        fi
        echo "Terminal type patch applied."

        echo "All critical Windows UAC2 patches applied successfully."

    # ---------------- ADD wMaxPacketSize +1 FRAME PATCH (Fixes 48kHz) ----------------
    - name: Apply wMaxPacketSize +1 Frame Patch
      working-directory: ./kernel
      run: |
        set -e
        FILE="drivers/usb/gadget/function/f_uac2.c"

        # Write the patch file using printf (YAML-safe)
        printf '--- a/drivers/usb/gadget/function/f_uac2.c
+++ b/drivers/usb/gadget/function/f_uac2.c
@@ -537,7 +537,7 @@ static int set_ep_max_packet_size(const struct f_uac2_opts *uac2_opts,
 
 	max_size_bw = num_channels(chmask) * ssize *
 		(uac2_opts->fb_max > 0 ? 1 : 0) +
-		DIV_ROUND_UP(srate, factor / (1 << (ep_desc->bInterval - 1)));
+		(DIV_ROUND_UP(srate, factor / (1 << (ep_desc->bInterval - 1))) + 1);
 	ep_desc->wMaxPacketSize = cpu_to_le16(min_t(u16, max_size_bw,
 						    max_size_ep));
 
' > /tmp/wmax_patch.diff

        # Apply the patch with fuzz
        patch -p1 --fuzz=3 --ignore-whitespace < /tmp/wmax_patch.diff
        echo "wMaxPacketSize +1 frame patch applied successfully."

    # ---------------- CONFIG ----------------
    - name: Configure kernel
      working-directory: ./kernel
      run: |
        set -e

        make O=out ARCH=arm64 vendor/xiaomi/miatoll_defconfig

        # Disable broken WiFi driver (not needed for USB DAC mode)
        scripts/config --file out/.config --disable CONFIG_QCA_CLD_WLAN
        scripts/config --file out/.config --disable CONFIG_QCACLD_WLAN
        scripts/config --file out/.config --disable CONFIG_WLAN

        # USB AUDIO GADGET
        scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS
        scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_UAC2
        scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_UAC1
        scripts/config --file out/.config --enable CONFIG_USB_G_AUDIO
        scripts/config --file out/.config --enable CONFIG_SND_USB_AUDIO

        # LOW LATENCY SAFE SETTINGS
        scripts/config --file out/.config --enable CONFIG_PREEMPT
        scripts/config --file out/.config --enable CONFIG_HIGH_RES_TIMERS
        scripts/config --file out/.config --set-val CONFIG_HZ 1000

        # stability
        scripts/config --file out/.config --disable CONFIG_DEBUG_INFO
        scripts/config --file out/.config --disable CONFIG_SND_DEBUG

        make O=out olddefconfig

    # ---------------- BUILD ----------------
    - name: Build
      working-directory: ./kernel
      run: |
        set -e
        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          READELF=llvm-readelf \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          LLVM=1 LLVM_IAS=1 \
          Image.gz dtbo.img

        test -f out/arch/arm64/boot/Image.gz

    # ---------------- FIX ANYKERNEL3 FOR MIATOLL ----------------
    - name: Fix AnyKernel3 for Miatoll
      run: |
        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=miatoll/' anykernel.sh
        sed -i 's/device.name2=.*/device.name2=joyeuse/' anykernel.sh
        sed -i 's/device.name3=.*/device.name3=curtana/' anykernel.sh
        sed -i 's/device.name4=.*/device.name4=gram/' anykernel.sh
        sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=/dev/block/by-name/boot;|' anykernel.sh
        sed -i 's/is_slot_device=.*/is_slot_device=0;/' anykernel.sh

    # ---------------- PACKAGE ----------------
    - name: Package
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

        cd AnyKernel3
        zip -r9 ../Miatoll_UAC2_DAC.zip . -x ".git*" "*.md"

    # ---------------- UPLOAD ----------------
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Miatoll-UAC2-DAC
        path: Miatoll_UAC2_DAC.zip
