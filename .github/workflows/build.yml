name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    #--------------------------------------------------
    # 1. Checkout Kernel Source
    #--------------------------------------------------
    - name: Clone Kernel Source
      uses: actions/checkout@v4
      with:
        repository: clarencelol/kernel_xiaomi_sm6250
        ref: kinesis-v29
        path: kernel

    #--------------------------------------------------
    # 2. Apply Official UAC2 Windows Patches (4 patches)
    #--------------------------------------------------
    - name: Apply UAC2 Windows Patches
      working-directory: ./kernel
      run: |
        cat > uac2_win_fixes.patch << 'EOF'
--- a/drivers/usb/gadget/function/f_uac2.c
+++ b/drivers/usb/gadget/function/f_uac2.c
@@ -371,7 +371,7 @@ static struct usb_endpoint_descriptor fs_epout_desc = {
 	.bLength = USB_DT_ENDPOINT_SIZE,
 	.bDescriptorType = USB_DT_ENDPOINT,
 	.bEndpointAddress = USB_DIR_OUT,
-	.bmAttributes = USB_ENDPOINT_XFER_ISOC | USB_ENDPOINT_SYNC_SYNC,
+	.bmAttributes = USB_ENDPOINT_XFER_ISOC | USB_ENDPOINT_SYNC_ADAPTIVE,
 	/* .wMaxPacketSize = DYNAMIC */
 	.bInterval = 4,
 };
@@ -393,7 +393,7 @@ static struct usb_endpoint_descriptor hs_epout_desc = {
 	.bLength = USB_DT_ENDPOINT_SIZE,
 	.bDescriptorType = USB_DT_ENDPOINT,
 	.bEndpointAddress = USB_DIR_OUT,
-	.bmAttributes = USB_ENDPOINT_XFER_ISOC | USB_ENDPOINT_SYNC_SYNC,
+	.bmAttributes = USB_ENDPOINT_XFER_ISOC | USB_ENDPOINT_SYNC_ADAPTIVE,
 	/* .wMaxPacketSize = DYNAMIC */
 	.bInterval = 4,
 };
@@ -539,7 +539,7 @@ static int set_ep_max_packet_size(const struct f_uac2_opts *uac2_opts,
 
 	max_size_bw = num_channels(chmask) * ssize *
 		(uac2_opts->fb_max > 0 ? 1 : 0) +
-		DIV_ROUND_UP(srate, factor / (1 << (ep_desc->bInterval - 1)));
+		(DIV_ROUND_UP(srate, factor / (1 << (ep_desc->bInterval - 1))) + 1);
 	ep_desc->wMaxPacketSize = cpu_to_le16(min_t(u16, max_size_bw,
 						    max_size_ep));
 
@@ -721,8 +721,8 @@ static int afunc_bind(struct usb_configuration *cfg, struct usb_function *f)
 	usb_out_it_desc.bNrChannels = num_channels(uac2_opts->c_chmask);
 	usb_out_it_desc.bmChannelConfig = cpu_to_le32(uac2_opts->c_chmask);
 	usb_out_it_desc.iChannelNames = 0;
-	usb_out_it_desc.wTerminalType = cpu_to_le16(UAC_TERMINAL_UNDEFINED);
-	io_in_it_desc.wTerminalType = cpu_to_le16(UAC_TERMINAL_UNDEFINED);
+	usb_out_it_desc.wTerminalType = cpu_to_le16(UAC_TERMINAL_MICROPHONE);
+	io_in_it_desc.wTerminalType = cpu_to_le16(UAC_TERMINAL_SPEAKER);
 
 	/* AS AS Interface 1 - Playback */
 	usb_interface_desc(&as_in_if1_desc, &as_in_if1_desc,
EOF
        # Apply the patch
        patch -p1 < uac2_win_fixes.patch
        echo "✅ All 4 UAC2 patches applied successfully"
        
        # Verify patches were applied
        echo ""
        echo "=== Verification ==="
        grep -q "SYNC_ADAPTIVE" drivers/usb/gadget/function/f_uac2.c && echo "✅ Patch 1: Adaptive endpoint"
        grep -q "DIV_ROUND_UP.*+ 1" drivers/usb/gadget/function/f_uac2.c && echo "✅ Patch 2: +1 frame"
        grep -q "UAC_TERMINAL_MICROPHONE" drivers/usb/gadget/function/f_uac2.c && echo "✅ Patch 3: Microphone terminal"
        grep -q "UAC_TERMINAL_SPEAKER" drivers/usb/gadget/function/f_uac2.c && echo "✅ Patch 4: Speaker terminal"
        echo "========================="

    #--------------------------------------------------
    # 3. Checkout AnyKernel3
    #--------------------------------------------------
    - name: Clone AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: AnyKernel3

    #--------------------------------------------------
    # 4. Install Dependencies
    #--------------------------------------------------
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget curl bc bison flex libssl-dev \
          libncurses5-dev libncursesw5-dev \
          zip unzip python3 ccache xz-utils

    #--------------------------------------------------
    # 5. Setup LLVM 17 Toolchain
    #--------------------------------------------------
    - name: Setup LLVM 17
      run: |
        mkdir -p toolchains
        cd toolchains
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.2/clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        mv clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04 clang
        rm clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz

    #--------------------------------------------------
    # 6. Setup GCC Toolchains
    #--------------------------------------------------
    - name: Setup GCC Toolchains
      run: |
        cd toolchains
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc64.tar.gz
        tar -xf gcc64.tar.gz
        mv android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9-* gcc64
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc32.tar.gz
        tar -xf gcc32.tar.gz
        mv android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9-* gcc32

    #--------------------------------------------------
    # 7. Export Environment Variables
    #--------------------------------------------------
    - name: Set Environment Variables
      run: |
        echo "PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

    #--------------------------------------------------
    # 8. Configure Kernel (Enable UAC2)
    #--------------------------------------------------
    - name: Configure Kernel
      run: |
        DEFCONFIG=kernel/arch/arm64/configs/vendor/xiaomi/miatoll_defconfig
        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> $DEFCONFIG
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> $DEFCONFIG
        echo "CONFIG_USB_G_AUDIO=y" >> $DEFCONFIG
        echo "# CONFIG_COMPAT_VDSO is not set" >> $DEFCONFIG

    #--------------------------------------------------
    # 9. Build Kernel with LLVM 17
    #--------------------------------------------------
    - name: Build Kernel
      run: |
        cd kernel
        make O=out ARCH=arm64 vendor/xiaomi/miatoll_defconfig
        scripts/config --file out/.config --disable CONFIG_COMPAT_VDSO
        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          READELF=llvm-readelf \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          LLVM=1 \
          LLVM_IAS=1 \
          Image.gz dtbo.img

    #--------------------------------------------------
    # 10. Fix AnyKernel3 for Miatoll
    #--------------------------------------------------
    - name: Fix AnyKernel3 Configuration
      run: |
        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=miatoll/' anykernel.sh
        sed -i 's/device.name2=.*/device.name2=joyeuse/' anykernel.sh
        sed -i 's/device.name3=.*/device.name3=curtana/' anykernel.sh
        sed -i 's/device.name4=.*/device.name4=gram/' anykernel.sh
        sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=/dev/block/by-name/boot;|' anykernel.sh
        sed -i 's/is_slot_device=.*/is_slot_device=0;/' anykernel.sh
        echo "✅ AnyKernel3 configured for Miatoll"

    #--------------------------------------------------
    # 11. Package Kernel
    #--------------------------------------------------
    - name: Package Kernel
      run: |
        if [ ! -f kernel/out/arch/arm64/boot/Image.gz ]; then
          echo "ERROR: Image.gz not found!"
          exit 1
        fi
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/
        [ -f kernel/out/arch/arm64/boot/dtb.img ] && cp kernel/out/arch/arm64/boot/dtb.img AnyKernel3/
        cd AnyKernel3
        zip -r9 ../Xiaomi_Miatoll_UAC2_$(date +%Y%m%d-%H%M%S).zip * -x .git README.md .gitignore
        echo "✅ Kernel package created successfully"

    #--------------------------------------------------
    # 12. Upload Artifact
    #--------------------------------------------------
    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Xiaomi-Miatoll-Kernel-UAC2
        path: Xiaomi_Miatoll_UAC2_*.zip
        compression-level: 0
