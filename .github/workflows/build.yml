name: Build Miatoll Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TOOLCHAINS_DIR: ${{ github.workspace }}/toolchains

jobs:
  build_kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison flex zip curl python3 unzip wget git \
          libssl-dev libncurses5-dev libncursesw5-dev ccache libhiredis0.14

    - name: Prepare toolchains
      run: |
        mkdir -p $TOOLCHAINS_DIR/clang
        mkdir -p $TOOLCHAINS_DIR/gcc64
        mkdir -p $TOOLCHAINS_DIR/gcc32
        echo "PATH=$TOOLCHAINS_DIR/clang/bin:$TOOLCHAINS_DIR/gcc64/bin:$TOOLCHAINS_DIR/gcc32/bin:$PATH" >> $GITHUB_ENV

    - name: Configure kernel
      run: |
        cd kernel
        make O=out ARCH=arm64 <your_defconfig_here>
        make -C out KBUILD_SRC=../kernel -f ../kernel/Makefile Image.gz

    - name: Build kernel
      run: |
        cd kernel
        make -C out KBUILD_SRC=../kernel -f ../kernel/Makefile -j$(nproc) Image.gz

    - name: Upload kernel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: |
          kernel/out/arch/arm64/boot/Image.gz
          kernel/out/arch/arm64/boot/dts/
