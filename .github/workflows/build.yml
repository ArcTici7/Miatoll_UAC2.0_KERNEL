name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: ProjectVelvet/kernel_xiaomi_sm6250
        ref: non-ksu
        path: kernel

    - name: Checkout AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: anykernel

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex gcc-multilib g++-multilib git gnupg gperf libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zip zlib1g-dev libssl-dev

    - name: Get Proton Clang
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        curl -L -o clang.tar.gz https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
        tar -xzf clang.tar.gz --strip-components=1
        rm clang.tar.gz
        chmod +x bin/*

    - name: Get 64-bit ARM GCC
      run: |
        mkdir -p toolchains/gcc64
        cd toolchains/gcc64
        curl -L -o gcc64.tar.gz https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz
        tar -xzf gcc64.tar.gz --strip-components=1
        rm gcc64.tar.gz

    - name: Get 32-bit ARM GCC
      run: |
        mkdir -p toolchains/gcc32
        cd toolchains/gcc32
        curl -L -o gcc32.tar.gz https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz
        tar -xzf gcc32.tar.gz --strip-components=1
        rm gcc32.tar.gz

    - name: Fix defconfig - Aggressive PRIME_CPU_MASK Removal
      working-directory: ./kernel
      run: |
        # Remove PRIME_CPU_MASK from all defconfig files
        find . -name "*defconfig" -exec sed -i '/PRIME_CPU_MASK/d' {} \;
        
        # Disable SCHED_MC
        find . -name "*defconfig" -exec sed -i 's/CONFIG_SCHED_MC=y/# CONFIG_SCHED_MC is not set/g' {} \;
        
        # Enable USB gadget audio
        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> arch/arm64/configs/vendor/miatoll-stock_defconfig
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> arch/arm64/configs/vendor/miatoll-stock_defconfig
        echo "CONFIG_USB_G_AUDIO=y" >> arch/arm64/configs/vendor/miatoll-stock_defconfig

    - name: Build Kernel
      working-directory: ./kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH"
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        # Disable all config update prompts
        export KCONFIG_NOSILENTUPDATE=1
        export KCONFIG_NONINTERACTIVE=1
        
        echo "=== Toolchain Verification ==="
        clang --version | head -n1
        ${CROSS_COMPILE}gcc --version | head -n1
        ${CROSS_COMPILE_ARM32}gcc --version | head -n1
        echo "=============================="
        
        # Generate defconfig
        make O=out ARCH=arm64 vendor/miatoll-stock_defconfig
        
        # Aggressively remove PRIME_CPU_MASK from .config
        sed -i '/PRIME_CPU_MASK/d' out/.config
        
        # Run olddefconfig to set defaults
        make O=out ARCH=arm64 olddefconfig
        
        # Remove PRIME_CPU_MASK again (in case it came back)
        sed -i '/PRIME_CPU_MASK/d' out/.config
        
        # Force-add UAC2 flags
        sed -i '/CONFIG_USB_CONFIGFS_F_UAC2/d' out/.config
        sed -i '/CONFIG_USB_CONFIGFS_F_UAC1/d' out/.config
        sed -i '/CONFIG_USB_G_AUDIO/d' out/.config
        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> out/.config
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> out/.config
        echo "CONFIG_USB_G_AUDIO=y" >> out/.config
        
        # Verify
        echo "=== Final Config Check ==="
        grep -E "UAC|USB_G_AUDIO|PRIME" out/.config || echo "No PRIME_CPU_MASK found - good!"
        echo "=========================="
        
        # Build directly WITHOUT silentoldconfig
        make -j$(nproc) O=out ARCH=arm64 Image.gz dtbo.img

    - name: Package AnyKernel3 Zip
      run: |
        # Copy kernel images
        cp kernel/out/arch/arm64/boot/Image.gz anykernel/
        cp kernel/out/arch/arm64/boot/dtbo.img anykernel/
        
        # Copy dtb.img if it exists
        if [ -f kernel/out/arch/arm64/boot/dtb.img ]; then
          cp kernel/out/arch/arm64/boot/dtb.img anykernel/
        fi
        
        # Create zip
        cd anykernel
        zip -r9 ../Xiaomi_Miatoll_UAC2_$(date +%Y%m%d-%H%M%S).zip * -x .git README.md .gitignore
        
        echo "✅ Package created successfully"

    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Xiaomi-Miatoll-Kernel-UAC2
        path: Xiaomi_Miatoll_UAC2_*.zip
        compression-level: 0
