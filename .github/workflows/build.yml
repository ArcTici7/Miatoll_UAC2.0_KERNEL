name: Build Miatoll Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-22.04
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex zip curl python3 unzip wget git ccache \
            libncurses5-dev libncursesw5-dev libssl-dev libhiredis0.14 clang-16 lld-16

      - name: Set toolchain paths
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains
          # If you have local gcc64/gcc32, adjust paths here
          echo "PATH=/usr/lib/llvm-16/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH" >> $GITHUB_ENV

      - name: Prepare kernel build directory
        run: |
          cd kernel
          mkdir -p out
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- mrproper
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig

      - name: Remove incompatible Polly flags (safety)
        run: |
          find kernel -name 'Makefile' -exec sed -i 's/-polly[^ ]*//g' {} +
          echo "Polly flags sanitized (if present)."

      - name: Build kernel
        run: |
          cd kernel
          make -C out O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- Image.gz -j$(nproc)

      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: kernel-image
          path: kernel/out/arch/arm64/boot/Image.gz
