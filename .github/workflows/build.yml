name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    #--------------------------------------------------
    # 1. Checkout Kernel Source
    #--------------------------------------------------
    - name: Clone Kernel Source
      uses: actions/checkout@v4
      with:
        repository: clarencelol/kernel_xiaomi_sm6250
        ref: kinesis-v29
        path: kernel

    #--------------------------------------------------
    # 2. Apply ALL 4 Windows UAC2 Fixes
    #--------------------------------------------------
    - name: Apply ALL 4 Windows UAC2 Fixes
      working-directory: ./kernel
      run: |
        echo "=== Applying ALL 4 Windows UAC2 fixes ==="
        
        # FIX 1: Change OUT endpoint from SYNC to ADAPTIVE
        echo "Fix 1: Changing OUT endpoint to ADAPTIVE..."
        sed -i '377s/USB_ENDPOINT_SYNC_SYNC/USB_ENDPOINT_SYNC_ADAPTIVE/' drivers/usb/gadget/function/f_uac2.c
        
        # FIX 2: Add +1 frame to wMaxPacketSize (Windows enumeration fix)
        echo "Fix 2: Adding +1 frame to wMaxPacketSize..."
        sed -i 's/cpu_to_le16(min_t(u16, max_size_bw,/cpu_to_le16(min_t(u16, max_size_bw, + 1,/' drivers/usb/gadget/function/f_uac2.c
        
        # FIX 3: Set proper terminal types (Microphone/Speaker)
        echo "Fix 3: Setting terminal types to MICROPHONE and SPEAKER..."
        sed -i 's/UAC_INPUT_TERMINAL_UNDEFINED/UAC_INPUT_TERMINAL_MICROPHONE/g' drivers/usb/gadget/function/f_uac2.c
        sed -i 's/UAC_OUTPUT_TERMINAL_UNDEFINED/UAC_OUTPUT_TERMINAL_SPEAKER/g' drivers/usb/gadget/function/f_uac2.c
        
        # FIX 4: Add SuperSpeed feedback endpoint companion descriptor
        echo "Fix 4: Adding SuperSpeed feedback companion descriptor..."
        sed -i '/ss_epin_fback_desc = {/a static struct usb_ss_ep_comp_descriptor ss_epin_fback_desc_comp = { .bLength = sizeof(ss_epin_fback_desc_comp), .bDescriptorType = USB_DT_SS_ENDPOINT_COMP, .bMaxBurst = 0, .bmAttributes = 0, .wBytesPerInterval = cpu_to_le16(4), };' drivers/usb/gadget/function/f_uac2.c
        
        echo ""
        echo "=== VERIFYING ALL 4 FIXES ==="
        echo ""
        
        # Verify Fix 1
        if grep -q "SYNC_ADAPTIVE" drivers/usb/gadget/function/f_uac2.c; then
          echo "✅ Fix 1: OUT endpoint is ADAPTIVE"
        else
          echo "❌ Fix 1: OUT endpoint still SYNC"
        fi
        
        # Verify Fix 2
        if grep -q "max_size_bw, + 1" drivers/usb/gadget/function/f_uac2.c; then
          echo "✅ Fix 2: +1 frame added to wMaxPacketSize"
        else
          echo "⚠️ Fix 2: Could not verify +1 frame"
        fi
        
        # Verify Fix 3
        if grep -q "UAC_INPUT_TERMINAL_MICROPHONE" drivers/usb/gadget/function/f_uac2.c; then
          echo "✅ Fix 3: Terminal type set to MICROPHONE"
        else
          echo "⚠️ Fix 3: Terminal type may need manual check"
        fi
        
        # Verify Fix 4
        if grep -q "ss_epin_fback_desc_comp" drivers/usb/gadget/function/f_uac2.c; then
          echo "✅ Fix 4: SuperSpeed feedback companion descriptor added"
        else
          echo "⚠️ Fix 4: Could not verify - may not be needed for USB 2.0"
        fi
        
        echo ""
        echo "=== Final endpoint status ==="
        grep -n "USB_ENDPOINT_SYNC_" drivers/usb/gadget/function/f_uac2.c | head -6
        echo ""
        echo "✅ All fixes applied"

    #--------------------------------------------------
    # 3. Checkout AnyKernel3
    #--------------------------------------------------
    - name: Clone AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: AnyKernel3

    #--------------------------------------------------
    # 4. Install Dependencies
    #--------------------------------------------------
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget curl bc bison flex libssl-dev \
          libncurses5-dev libncursesw5-dev \
          zip unzip python3 ccache xz-utils

    #--------------------------------------------------
    # 5. Setup LLVM 17 Toolchain
    #--------------------------------------------------
    - name: Setup LLVM 17
      run: |
        mkdir -p toolchains
        cd toolchains
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.2/clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        mv clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04 clang
        rm clang+llvm-17.0.2-x86_64-linux-gnu-ubuntu-22.04.tar.xz

    #--------------------------------------------------
    # 6. Setup GCC Toolchains
    #--------------------------------------------------
    - name: Setup GCC Toolchains
      run: |
        cd toolchains
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc64.tar.gz
        tar -xf gcc64.tar.gz
        mv android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9-* gcc64
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc32.tar.gz
        tar -xf gcc32.tar.gz
        mv android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9-* gcc32

    #--------------------------------------------------
    # 7. Export Environment Variables
    #--------------------------------------------------
    - name: Set Environment Variables
      run: |
        echo "PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

    #--------------------------------------------------
    # 8. Configure Kernel (Enable UAC2)
    #--------------------------------------------------
    - name: Configure Kernel
      run: |
        DEFCONFIG=kernel/arch/arm64/configs/vendor/xiaomi/miatoll_defconfig
        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> $DEFCONFIG
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> $DEFCONFIG
        echo "CONFIG_USB_G_AUDIO=y" >> $DEFCONFIG
        echo "# CONFIG_COMPAT_VDSO is not set" >> $DEFCONFIG

    #--------------------------------------------------
    # 9. Build Kernel with LLVM 17
    #--------------------------------------------------
    - name: Build Kernel
      run: |
        cd kernel
        make O=out ARCH=arm64 vendor/xiaomi/miatoll_defconfig
        scripts/config --file out/.config --disable CONFIG_COMPAT_VDSO
        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          READELF=llvm-readelf \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          LLVM=1 \
          LLVM_IAS=1 \
          Image.gz dtbo.img

    #--------------------------------------------------
    # 10. Fix AnyKernel3 for Miatoll
    #--------------------------------------------------
    - name: Fix AnyKernel3 Configuration
      run: |
        cd AnyKernel3
        sed -i 's/device.name1=.*/device.name1=miatoll/' anykernel.sh
        sed -i 's/device.name2=.*/device.name2=joyeuse/' anykernel.sh
        sed -i 's/device.name3=.*/device.name3=curtana/' anykernel.sh
        sed -i 's/device.name4=.*/device.name4=gram/' anykernel.sh
        sed -i 's|BLOCK=.*|BLOCK=/dev/block/by-name/boot;|' anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=0;/' anykernel.sh

    #--------------------------------------------------
    # 11. Package Kernel
    #--------------------------------------------------
    - name: Package Kernel
      run: |
        if [ ! -f kernel/out/arch/arm64/boot/Image.gz ]; then
          echo "ERROR: Image.gz not found!"
          exit 1
        fi
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/
        [ -f kernel/out/arch/arm64/boot/dtb.img ] && cp kernel/out/arch/arm64/boot/dtb.img AnyKernel3/
        cd AnyKernel3
        zip -r9 ../Xiaomi_Miatoll_UAC2_$(date +%Y%m%d-%H%M%S).zip * -x .git README.md .gitignore
        echo "✅ Kernel package created successfully"

    #--------------------------------------------------
    # 12. Upload Artifact
    #--------------------------------------------------
    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Xiaomi-Miatoll-Kernel-UAC2
        path: Xiaomi_Miatoll_UAC2_*.zip
        compression-level: 0
