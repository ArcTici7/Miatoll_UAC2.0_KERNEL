name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    #--------------------------------------------------
    # 1. Checkout Kernel Source
    #--------------------------------------------------
    - name: Clone Kernel Source
      uses: actions/checkout@v4
      with:
        repository: clarencelol/kernel_xiaomi_sm6250
        ref: kinesis-v29
        path: kernel

    #--------------------------------------------------
    # 2. Checkout AnyKernel3 for packaging
    #--------------------------------------------------
    - name: Clone AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: AnyKernel3

    #--------------------------------------------------
    # 3. Install Required Packages
    #--------------------------------------------------
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget curl bc bison flex libssl-dev \
          libncurses5-dev libncursesw5-dev \
          zip unzip python3

    #--------------------------------------------------
    # 4. Download and Extract Toolchains (WORKING MIRRORS)
    #--------------------------------------------------
    - name: Setup Toolchains
      run: |
        mkdir toolchains && cd toolchains

        # Proton Clang
        wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz -O clang.tar.gz
        tar -xf clang.tar.gz
        mv proton-clang-* clang

        # GCC 64-bit
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc64.tar.gz
        tar -xf gcc64.tar.gz
        mv android_prebuilts_gcc_* gcc64

        # GCC 32-bit
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc32.tar.gz
        tar -xf gcc32.tar.gz
        mv android_prebuilts_gcc_* gcc32

    #--------------------------------------------------
    # 5. Export Build Environment Variables
    #--------------------------------------------------
    - name: Set Environment Variables
      run: |
        echo "CLANG_PATH=$GITHUB_WORKSPACE/toolchains/clang/bin" >> $GITHUB_ENV
        echo "GCC64_PATH=$GITHUB_WORKSPACE/toolchains/gcc64/bin" >> $GITHUB_ENV
        echo "GCC32_PATH=$GITHUB_WORKSPACE/toolchains/gcc32/bin" >> $GITHUB_ENV

        echo "PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH" >> $GITHUB_ENV

        # LLVM tools
        echo "CC=clang" >> $GITHUB_ENV
        echo "LD=ld.lld" >> $GITHUB_ENV
        echo "AR=llvm-ar" >> $GITHUB_ENV
        echo "NM=llvm-nm" >> $GITHUB_ENV
        echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
        echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
        echo "READELF=llvm-readelf" >> $GITHUB_ENV
        echo "OBJSIZE=llvm-size" >> $GITHUB_ENV
        echo "STRIP=llvm-strip" >> $GITHUB_ENV

    #--------------------------------------------------
    # 6. Enable USB Gadget Audio (UAC1 + UAC2)
    #--------------------------------------------------
    - name: Enable UAC2 in Defconfig
      run: |
        DEFCONFIG=kernel/arch/arm64/configs/vendor/xiaomi/miatoll_defconfig

        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> $DEFCONFIG
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> $DEFCONFIG
        echo "CONFIG_USB_G_AUDIO=y" >> $DEFCONFIG

    #--------------------------------------------------
    # 7. Build Kernel with LLVM/Clang
    #--------------------------------------------------
    - name: Build Kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        # Load defconfig
        make O=out ARCH=arm64 vendor/xiaomi/miatoll_defconfig

        # Compile kernel (LLVM forced)
        make -j$(nproc) O=out \
          ARCH=arm64 \
          LLVM=1 \
          LLVM_IAS=1 \
          Image.gz dtbo.img

    #--------------------------------------------------
    # 8. Package with AnyKernel3
    #--------------------------------------------------
    - name: Package Kernel
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

        cd AnyKernel3
        zip -r9 kernel-miatoll-uac2.zip *

    #--------------------------------------------------
    # 9. Upload Final Flashable ZIP
    #--------------------------------------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: miatoll-uac2-kernel
        path: AnyKernel3/kernel-miatoll-uac2.zip
