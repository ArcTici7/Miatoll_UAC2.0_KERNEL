name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    #--------------------------------------------------
    # 1. Checkout Kernel Source
    #--------------------------------------------------
    - name: Clone Kernel Source
      uses: actions/checkout@v4
      with:
        repository: clarencelol/kernel_xiaomi_sm6250
        ref: kinesis-v29
        path: kernel

    #--------------------------------------------------
    # 2. Checkout AnyKernel3
    #--------------------------------------------------
    - name: Clone AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: AnyKernel3

    #--------------------------------------------------
    # 3. Install Dependencies
    #--------------------------------------------------
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget curl bc bison flex libssl-dev \
          libncurses5-dev libncursesw5-dev \
          zip unzip python3 ccache

    #--------------------------------------------------
    # 4. Cache Toolchains
    #--------------------------------------------------
    - name: Cache Toolchains
      uses: actions/cache@v3
      with:
        path: |
          toolchains/clang
          toolchains/gcc64
          toolchains/gcc32
        key: toolchains-${{ runner.os }}-v1

    #--------------------------------------------------
    # 5. Setup Toolchains
    #--------------------------------------------------
    - name: Setup Toolchains
      run: |
        mkdir -p toolchains
        cd toolchains

        # Proton Clang
        if [ ! -d clang ]; then
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz
          mv proton-clang-* clang
        fi

        # GCC 64-bit
        if [ ! -d gcc64 ]; then
          wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc64.tar.gz
          tar -xf gcc64.tar.gz
          mv android_prebuilts_gcc_* gcc64
        fi

        # GCC 32-bit
        if [ ! -d gcc32 ]; then
          wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz -O gcc32.tar.gz
          tar -xf gcc32.tar.gz
          mv android_prebuilts_gcc_* gcc32
        fi

    #--------------------------------------------------
    # 6. Export Environment Variables
    #--------------------------------------------------
    - name: Set Environment Variables
      run: |
        echo "PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH" >> $GITHUB_ENV

        echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "USE_CCACHE=1" >> $GITHUB_ENV

    #--------------------------------------------------
    # 7. Remove Broken Polly Flags (Safety Net)
    #--------------------------------------------------
    - name: Remove Polly Flags
      run: |
        cd kernel
        grep -rl "polly" . | xargs -r sed -i 's/-mllvm[= ]*-polly[^ ]*//g'
        grep -rl "polly" . | xargs -r sed -i 's/-polly[^ ]*//g'

    #--------------------------------------------------
    # 8. Enable UAC2 in Defconfig
    #--------------------------------------------------
    - name: Enable UAC2
      run: |
        DEFCONFIG=kernel/arch/arm64/configs/vendor/xiaomi/miatoll_defconfig
        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> $DEFCONFIG
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> $DEFCONFIG
        echo "CONFIG_USB_G_AUDIO=y" >> $DEFCONFIG

    #--------------------------------------------------
    # 9. Build Kernel
    #--------------------------------------------------
    - name: Build Kernel
      run: |
        cd kernel
        export ARCH=arm64
        export SUBARCH=arm64

        # Defconfig
        make O=out ARCH=arm64 vendor/xiaomi/miatoll_defconfig

        # Parallel build using all cores, clang, and ccache
        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          HOSTCC=clang \
          HOSTCXX=clang++ \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          LLVM=1 \
          LLVM_IAS=1 \
          Image.gz dtbo.img

    #--------------------------------------------------
    # 10. Package Kernel
    #--------------------------------------------------
    - name: Package Kernel
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/
        cd AnyKernel3
        zip -r9 kernel-miatoll-uac2.zip *

    #--------------------------------------------------
    # 11. Upload Artifact
    #--------------------------------------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: miatoll-uac2-kernel
        path: AnyKernel3/kernel-miatoll-uac2.zip
